# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"                # Ubicación de package.json y pnpm-lock.yaml
    schedule:
      interval: "weekly"          # Cambia a "daily" si quieres actualizaciones más frecuentes
    open-pull-requests-limit: 5   # Evita demasiadas PRs abiertas
    commit-message:
      prefix: "deps"              # Prefijo para los commits de actualización
    allow:
      - dependency-type: "all"    # Actualiza dependencies y devDependencies
